version: '3.8'

services:
  # 1. ZOOKEEPER: Người quản lý cụm Kafka
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: mla_zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - automation_net

  # 2. KAFKA: Trái tim điều phối luồng sự kiện (Message Broker)
  kafka:
    image: bitnami/kafka:3.5
    container_name: mla_kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092" 
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true 
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - automation_net

  # 3. POSTGRESQL
  postgres:
    image: postgres:15-alpine
    container_name: mla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automation_net

  # 4. KAFKA UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mla_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "Local-MVP"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    depends_on:
      - kafka
      - zookeeper
    networks:
      - automation_net
volumes:
  postgres_data:
  kafka_data:
networks:
  automation_net:
    driver: bridge